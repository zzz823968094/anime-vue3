services:
  anime-vue3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-vue3-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      # 生产环境配置
      - NODE_ENV=production
      - VITE_API_BASE_URL=https://www.animeparadise.vip
      - VITE_WS_BASE_URL=wss://www.animeparadise.vip
    networks:
      - anime-network

networks:
  anime-network:
    driver: bridge
